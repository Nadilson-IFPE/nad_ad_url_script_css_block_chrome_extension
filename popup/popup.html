<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloqueador de Sites de Anúncios</title>
    <style>
        body {
            font-family: Roboto, sans-serif;
            width: 500px;
            text-align: center;
			padding: 20px; 
			background-color: #232c51; 
			color: #fff; 
        }
		button { padding: 20px 20px; margin-top: 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
	   .enable { background-color: #4CAF50; color: white; }
       .disable { background-color: #f44336; color: white; }
    </style>
</head>
<body>
    <img src="../images/nad_ad_blocker.png" width="256px" height="256px" />
    <h1>Bloqueador de Sites de Anúncios</h1>
    <p id="itemCount">Carregando dados da lista negra...</p>
	<button id="toggleBtn" class="disable">Pausar extensão</button>
    <script src="../scripts/popup.js"></script>
</body>
</html>
